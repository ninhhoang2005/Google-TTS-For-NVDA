summary = "Google TTS For NVDA"
description = """通过受支持的 Chromium 内核浏览器运行时（如 Google Chrome、Microsoft Edge 或 Brave），在本地使用 Google WASM 文本转语音声音，作为 NVDA 的语音合成器。"""
changelog = """0.5.5 版本：
- 改进了 CLD2 与 Google TTS 之间语言代码别名的自动语言配置文件匹配，包括菲律宾语（他加禄语）、爪哇语、旧版希伯来语代码、挪威语变体、阿拉伯语以及简体中文、繁体中文和粤语的映射。
- 使用 MSVC 替代 MinGW-w64 重新构建了随附的 Windows CLD2 DLL，使打包后的插件包在 VirusTotal 检测中不再像此前那样出现误报病毒的情况。"""