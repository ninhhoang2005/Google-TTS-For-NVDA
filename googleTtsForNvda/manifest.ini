name = googleTtsForNvda
summary = "Google TTS For NVDA"
description = """Use Google's WASM text-to-speech voices locally through a supported Chromium browser runtime such as Google Chrome, Microsoft Edge, or Brave as an NVDA synthesizer."""
author = "Nguyen Anh Duc <ducna1803@gmail.com>, Dao Duc Trung <trung@ddt.one> and Pham Hung Vuong <hungvuong106206@gmail.com>"
url = https://github.com/nguyenanhduc09/Google-TTS-For-NVDA
version = 0.5
docFileName = readme.html
minimumNVDAVersion = 2024.1.0
lastTestedNVDAVersion = 2026.1.0
updateChannel = None
changelog = """Version 0.5:
- Added built-in add-on update checking, with optional startup checks, localized update information, in-NVDA download, handoff to NVDA's add-on installer, and support for small hotfix builds inside the same public version.
- Improved Chrome, Edge, and Brave runtime fallback, including skipping Edge when WebView2 is missing and another supported runtime is usable, and reducing silent startup or connection failures while the browser is still starting.
- Improved NVDA compatibility, language-change handling, speech reliability, optional pause shortening, Simplified Chinese, Traditional Chinese, and Russian localization, and accessible read-only status fields."""
