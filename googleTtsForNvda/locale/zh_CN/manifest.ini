summary = "Google TTS For NVDA"
description = """通过受支持的 Chromium 浏览器运行环境(如 Google Chrome、Microsoft Edge 或 Brave)在本地使用 Google 的 WASM 语音合成技术,作为 NVDA 的语音合成器。"""
changelog = """版本 0.4:
- 新增可在 Google TTS For NVDA 设置中配置的自动语言配置文件,支持按语言分别设置语音、变体、语速、音调、音量、大写字母提示及拼读方式。
- 改进了与 NVDA 2024.1 至 2026 版本的兼容性,并使切换语音合成器更加安全。
- 改进了多语言长文本朗读,支持更广泛的 Unicode 标点符号及无空格文字的处理。
- 新增 Brave 作为受支持的 Chromium 浏览器运行环境,并改进了 Chrome、Edge 与 Brave 之间的回退行为。
- 明确了 Edge WebView2 的故障排除说明,并在 GitHub README 中记录了自定义 Chrome、Edge 与 Brave 路径的方法。
- 新增可自行指定的手势用于打开 Google TTS For NVDA 设置,并改进了启用自动语言配置文件时的语音设置环设置提示;此模式下语音参数由配置文件管理,以保持与 NVDA 语音设置的兼容性。
- 改进了语音与变体选择、语音预热、语音管理器安全性以及语音中断处理。"""
