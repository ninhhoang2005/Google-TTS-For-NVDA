summary = "Google TTS Cho NVDA"
description = """Sử dụng cục bộ các giọng chuyển văn bản thành giọng nói WASM của Google thông qua runtime trình duyệt nhân Chromium được hỗ trợ như Google Chrome, Microsoft Edge hoặc Brave làm bộ đọc cho NVDA."""
changelog = """Phiên bản 0.5:
- Thêm kiểm tra cập nhật add-on tích hợp, với tùy chọn tự động kiểm tra khi NVDA khởi động, thông tin cập nhật đã bản địa hóa, tải ngay trong NVDA, chuyển sang trình cài add-on của NVDA và hỗ trợ các bản cập nhật sửa lỗi nhỏ trong cùng một số phiên bản công khai.
- Cải thiện dự phòng runtime trình duyệt giữa Chrome, Edge và Brave, gồm bỏ qua Edge khi thiếu WebView2 nhưng còn runtime được hỗ trợ khác dùng được, và giảm tình trạng im lặng hoặc lỗi kết nối khi trình duyệt vẫn đang khởi động.
- Cải thiện tương thích NVDA, xử lý thay đổi ngôn ngữ, độ ổn định giọng đọc, tùy chọn rút ngắn khoảng lặng, bản địa hóa tiếng Trung giản thể, tiếng Trung phồn thể và tiếng Nga, cùng các ô trạng thái chỉ đọc có thể tiếp cận."""
