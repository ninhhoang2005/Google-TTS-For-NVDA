summary = "Google TTS 适用于 NVDA"
description = """通过受支持的 Chromium 内核浏览器运行时（如 Google Chrome、Microsoft Edge 或 Brave），在本地使用 Google WASM 文本转语音（TTS）发音人，作为 NVDA 的语音合成器。"""
changelog = """版本 0.5：
- 新增内置插件更新检查功能，支持在 NVDA 启动时自动检查、查看本地化的更新说明、直接在 NVDA 内下载并跳转至插件安装程序。
- 优化了 Chrome、Edge 和 Brave 之间的浏览器运行时备用（回退）机制，包括在缺少 WebView2 且存在其他可用受支持运行时的情况下跳过 Edge。
- 增强了 NVDA 兼容性、语音稳定性、静音修剪选项、简体中文与俄语本地化，以及可访问的只读状态文本框。"""